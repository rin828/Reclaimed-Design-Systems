name: Build catalog and README

on:
  push:
    branches: [ "main" ]
    paths:
      - "systems/**"
      - "scripts/**"
      - "README.md"
      - "package.json"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build catalog + README section
        run: npm run build:catalog

      - name: Commit changes (if any)
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add catalog/catalog.json README.md systems/**/README.md
          git commit -m "chore: rebuild catalog + README"
          git push